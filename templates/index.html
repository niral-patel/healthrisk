<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Risk Predictor</title>
    <style>
        /* 🏗️ ARCHITECTURE: Inline CSS for simplicity
           Production would use separate CSS file or Bootstrap */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f4f8;
            color: #333;
        }
        .header {
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 2rem; margin-bottom: 8px; }
        .header p  { opacity: 0.85; font-size: 0.95rem; }

        .metrics {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            background: white;
            border-bottom: 1px solid #e0e0e0;
            flex-wrap: wrap;
        }
        .metric-card {
            text-align: center;
            padding: 10px 20px;
            border-radius: 8px;
            background: #f8f9ff;
            border: 1px solid #e0e8ff;
        }
        .metric-card .value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #1a73e8;
        }
        .metric-card .label {
            font-size: 0.75rem;
            color: #666;
            margin-top: 2px;
        }

        .container {
            max-width: 1100px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-bottom: 30px;
        }
        .section {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .section h3 {
            color: #1a73e8;
            margin-bottom: 16px;
            font-size: 1rem;
            border-bottom: 2px solid #e8f0fe;
            padding-bottom: 8px;
        }
        .form-group {
            margin-bottom: 14px;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: #555;
            margin-bottom: 5px;
            font-weight: 500;
        }
        .form-group select,
        .form-group input[type="number"] {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.9rem;
            background: #fafafa;
            transition: border-color 0.2s;
        }
        .form-group select:focus,
        .form-group input:focus {
            outline: none;
            border-color: #1a73e8;
            background: white;
        }
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .submit-btn:hover  { transform: translateY(-1px); }
        .submit-btn:active { transform: translateY(0); }

        /* ⚠️ GOTCHA: Responsive grid breaks on small screens
           Always test with mobile viewport */
        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🏥 Health Risk Predictor</h1>
    <p>Diabetes Risk Assessment powered by XGBoost |
       Trained on 253,680 CDC patient records</p>
</div>

<div class="metrics">
    <div class="metric-card">
        <div class="value">0.8242</div>
        <div class="label">ROC-AUC</div>
    </div>
    <div class="metric-card">
        <div class="value">79.0%</div>
        <div class="label">Recall</div>
    </div>
    <div class="metric-card">
        <div class="value">0.438</div>
        <div class="label">F1 Score</div>
    </div>
    <div class="metric-card">
        <div class="value">253,680</div>
        <div class="label">Training Records</div>
    </div>
</div>

<div class="container">
    <!-- 🏗️ ARCHITECTURE: POST to /predict — Flask handles this -->
    <form action="/predict" method="POST">
        <div class="form-grid">

            <!-- Column 1: Medical Conditions -->
            <div class="section">
                <h3>🩺 Medical Conditions</h3>

                <div class="form-group">
                    <label>High Blood Pressure</label>
                    <select name="HighBP">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>High Cholesterol</label>
                    <select name="HighChol">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Ever had Stroke</label>
                    <select name="Stroke">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Heart Disease / Attack</label>
                    <select name="HeartDiseaseorAttack">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Difficulty Walking</label>
                    <select name="DiffWalk">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>
            </div>

            <!-- Column 2: Lifestyle -->
            <div class="section">
                <h3>🏃 Lifestyle Factors</h3>

                <div class="form-group">
                    <label>BMI</label>
                    <input type="number" name="BMI"
                           min="10" max="60"
                           step="0.1" value="27.0"
                           required>
                </div>
                <div class="form-group">
                    <label>Smoker (100+ cigarettes lifetime)</label>
                    <select name="Smoker">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Physical Activity (past 30 days)</label>
                    <select name="PhysActivity">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Eats Fruit Daily</label>
                    <select name="Fruits">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Eats Vegetables Daily</label>
                    <select name="Veggies">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Heavy Alcohol Consumption</label>
                    <select name="HvyAlcoholConsump">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>
            </div>

            <!-- Column 3: Demographics -->
            <div class="section">
                <h3>👤 Demographics & Health</h3>

                <div class="form-group">
                    <label>Age Group</label>
                    <select name="Age">
                        <option value="1">18-24</option>
                        <option value="2">25-29</option>
                        <option value="3">30-34</option>
                        <option value="4">35-39</option>
                        <option value="5">40-44</option>
                        <option value="6">45-49</option>
                        <option value="7">50-54</option>
                        <option value="8">55-59</option>
                        <option value="9">60-64</option>
                        <option value="10">65-69</option>
                        <option value="11">70-74</option>
                        <option value="12">75-79</option>
                        <option value="13">80+</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>General Health</label>
                    <select name="GenHlth">
                        <option value="1">Excellent</option>
                        <option value="2">Very Good</option>
                        <option value="3">Good</option>
                        <option value="4">Fair</option>
                        <option value="5">Poor</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Bad Mental Health Days (0-30)</label>
                    <input type="number" name="MentHlth"
                           min="0" max="30" value="0">
                </div>
                <div class="form-group">
                    <label>Bad Physical Health Days (0-30)</label>
                    <input type="number" name="PhysHlth"
                           min="0" max="30" value="0">
                </div>
                <div class="form-group">
                    <label>Education Level</label>
                    <select name="Education">
                        <option value="1">No School</option>
                        <option value="2">Elementary</option>
                        <option value="3">Some High School</option>
                        <option value="4">High School Grad</option>
                        <option value="5">Some College</option>
                        <option value="6">College Graduate</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Annual Income</label>
                    <select name="Income">
                        <option value="1">Less than $10,000</option>
                        <option value="2">$10,000 - $14,999</option>
                        <option value="3">$15,000 - $19,999</option>
                        <option value="4">$20,000 - $24,999</option>
                        <option value="5">$25,000 - $34,999</option>
                        <option value="6">$35,000 - $49,999</option>
                        <option value="7">$50,000 - $74,999</option>
                        <option value="8">$75,000 or more</option>
                    </select>
                </div>
            </div>

        </div>

        <button type="submit" class="submit-btn">
            🔍 Predict Diabetes Risk
        </button>
    </form>
</div>

</body>
</html>
